name: Release — PDV

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Release Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Dependências do sistema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências npm
        run: npm ci

      # Em push de tag: cria GitHub Release e anexa os instaladores
      - name: Build e publicar Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PDV ComercialIA ${{ github.ref_name }}"
          releaseBody: "Release ${{ github.ref_name }} gerada automaticamente."
          releaseDraft: true
          prerelease: false

      # Em workflow_dispatch: só builda e sobe como artefato temporário
      - name: Build Tauri (manual)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: npm run tauri build

      - name: Upload artefatos (manual — Linux)
        if: "!startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: comercialia-pdv-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload artefatos (manual — Windows)
        if: "!startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: comercialia-pdv-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
